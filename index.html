<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>- . - - . - - - - . </title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #333;
        }

        .container {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .falling-image {
            position: absolute;
            width: 100px; /* smaller size */
            height: auto;
            filter: brightness(0.5);
            transform-origin: center;
        }

        .text {
            position: absolute;
            left: -150px;
            font-size: 18px;
            color: #fff;
            text-transform: lowercase;
        }

        .bottom-image {
            margin-top: 20px;
            width: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="image" src="Mr._Washee_Washee.webp" alt="Image" width="200">
        <div class="text">how do i remove him</div>
    </div>
    
    <img class="bottom-image" src="201887.png" alt="clkck her to downl">
    
    <!-- Audio Player -->
    <audio autoplay loop>
        <source src="chickfila.mp3" type="audio/mp3">
        Your browser does not support the audio element.
    </audio>

    <script>
        // Physics variables
        const gravity = 0.1;  // Increased gravity for more fall speed
        const friction = 0.98; // Slightly higher friction to slow horizontal movement faster
        const bounceFactor = 1; // Reduced bounce factor for more bounces

        const container = document.querySelector('.container');
        const numImages = 10;
        const imagePath = 'Mr._Washee_Washee.webp';
        const images = [];

        // Create 10 falling images
        for (let i = 0; i < numImages; i++) {
            const img = document.createElement('img');
            img.src = imagePath;
            img.classList.add('falling-image');

            // Randomly position the images within the container's width and height
            const randomX = Math.random() * window.innerWidth;
            const randomY = Math.random() * window.innerHeight;
            img.style.left = `${randomX}px`;
            img.style.top = `${randomY}px`;
            
            img.style.transform = `rotate(${Math.random() * 360}deg)`; // Random initial rotation
            container.appendChild(img);
            images.push({
                element: img,
                x: randomX,
                y: randomY,
                vx: Math.random() * 6 - 3, // Random horizontal velocity with more variation
                vy: Math.random() * 5 + 5, // Higher initial vertical velocity
                rotation: Math.random() * 360,
                rotationSpeed: Math.random() * 2 - 1 // Random rotation speed
            });
        }

        // Physics update function
        function updatePhysics() {
            images.forEach((imgData) => {
                const { element, x, y, vx, vy, rotation, rotationSpeed } = imgData;

                // Apply gravity
                const newVy = vy + gravity;

                // Update position
                const newX = x + vx;
                const newY = y + newVy;

                // Handle bounce off the floor (bottom of the screen)
                if (newY >= window.innerHeight - 50) {  // The "ground" is the bottom of the screen
                    imgData.vy = -vy * bounceFactor; // Reverse vertical velocity and reduce it
                    imgData.vx *= friction; // Apply friction to horizontal speed
                    imgData.y = window.innerHeight - 50; // Prevent going below the floor (ensuring it stays at the bottom)
                } else if (newY <= 0) {
                    imgData.vy = -vy * bounceFactor; // Bounce from the top of the screen
                    imgData.y = 0; // Prevent going above the screen
                } else {
                    imgData.y = newY; // Update vertical position
                    imgData.vy = newVy; // Update vertical velocity
                }

                // Handle bounce off the sides of the screen
                if (newX >= window.innerWidth - 50) {
                    imgData.vx = -vx * bounceFactor; // Reverse horizontal velocity and reduce it
                    imgData.x = window.innerWidth - 50; // Prevent going off the right side
                } else if (newX <= 0) {
                    imgData.vx = -vx * bounceFactor; // Bounce from the left side
                    imgData.x = 0; // Prevent going off the left side
                } else {
                    imgData.x = newX; // Update horizontal position
                }

                // Handle rotation
                imgData.rotation += rotationSpeed;

                // Update image position and rotation
                element.style.left = `${imgData.x}px`;
                element.style.top = `${imgData.y}px`;
                element.style.transform = `rotate(${imgData.rotation}deg)`;
            });
        }

        // Main animation loop
        function animate() {
            updatePhysics();
            requestAnimationFrame(animate); // Keep animating
        }

        animate(); // Start the animation
    </script>
</body>
</html>
