<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lvnadev</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: url('https://media0.giphy.com/media/tnPxFTth7qoDiw1rnm/giphy.gif?cid=6c09b952d6lqe98oxs9leoezie9ykj6d8qff7v1pqye6l6t0&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g') no-repeat center center fixed;
            background-size: cover;
            text-align: center;
            color: white;
        }
        .profile-container {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 15px;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
        }
        .buttons {
            margin-top: 20px;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            background: rgb(255, 255, 255);
            color: black;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
        }
        .button:hover {
            background: lightgray;
        }
        .music-button {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 14px;
            background: white;
            color: black;
            border: none;
            border-radius: 10px;
        }
        .music-button:hover {
            background: lightgray;
        }
        .music-info {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: flex;
            align-items: center;
        }
        .vinyl {
            width: 100px;
            height: 100px;
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .song-info {
            margin-left: 10px;
            text-align: left;
        }
        .song-title {
            font-weight: bold;
            font-size: 20px;
        }
        .song-artist {
            font-size: 16px;
            margin-top: -15px;
        }
    </style>
</head>
<body>
    <audio id="bg-music" loop autoplay>
        <source src="Prayer.mp3" type="audio/mpeg">
        d
    </audio>
    <button id="music-toggle" class="music-button" onclick="toggleMusic()">Play Music</button>
    <div class="profile-container">
        <img src="profile.png" alt="profile" class="profile-img">
        <h1>Luna</h1>
        <p class="subtitle">Beginner astronomer & programmer</p>
        <div class="buttons">
            <a href="https://linktr.ee/lvnadev" class="button">Socials</a>
            <a href="projects.html" class="button">Projects</a>
            <a href="https://github.com/lvnadev/lvnadev.github.io" class="button">GitHub</a>
        </div>
    </div>
    <div class="music-info">
        <img src="vinyl.png" alt="vinyl" class="vinyl">
        <div class="song-info">
            <p class="song-title">Prayer</p>
            <p class="song-artist">Kendrick Lamar</p>
        </div>
    </div>
    <script>
        const music = document.getElementById('bg-music');
        const musicToggle = document.getElementById('music-toggle');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicToggle.textContent = 'Muted';
            } else {
                music.play();
                musicToggle.textContent = 'Playing';
            }
            isPlaying = !isPlaying;
        }
    </script>
</body>
</html>
